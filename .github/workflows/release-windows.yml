name: Release — Windows

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to attach Windows artifacts to (e.g. v0.1.8)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = if ('${{ inputs.tag }}') { '${{ inputs.tag }}' } else { '${{ github.ref_name }}' }
          Get-ChildItem release -File | Where-Object {
            $_.Name -match '^(Slate-Setup-.*\.exe|Slate-.*-x64\.zip|Slate-.*\.exe)$'
          } | ForEach-Object {
            gh release upload $tag $_.FullName --clobber
          }
